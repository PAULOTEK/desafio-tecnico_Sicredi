# Configuracao do pipeline NovaRota (Databricks / Unity Catalog).
# Valores podem ser sobrescritos por variaveis de ambiente NOVAROTA_*.

catalogo: novarota
schema_bronze: bronze
schema_prata: prata
schema_ouro: ouro

# Qualifica as tabelas com o catalogo (catalogo.schema.tabela) no Unity Catalog.
# O notebook de setup liga isso automaticamente (config.usar_catalogo=True) ao
# chamar preparar_unity_catalog. Mantido aqui para referencia/parametrizacao.
usar_catalogo: false

# Volume de entrada. O setup (common/ambiente.py) cria e aponta para este caminho.
dir_landing: /Volumes/novarota/bronze/landing

modo_execucao: full  # full | incremental
