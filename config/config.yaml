# Configuracao do pipeline NovaRota.
# Valores podem ser sobrescritos por variaveis de ambiente NOVAROTA_* ou por
# argumentos de linha de comando dos jobs (--modo, --data-referencia, etc.).

catalogo: novarota
schema_bronze: bronze
schema_prata: prata
schema_ouro: ouro

# Qualifica as tabelas com o catalogo (catalogo.schema.tabela) no Unity Catalog.
# Local (metastore Spark) nao suporta 3 niveis, entao o padrao e false.
# No Databricks o notebook liga isso automaticamente (config.usar_catalogo=True).
usar_catalogo: false

# Caminhos relativos a raiz do projeto (ajustar para volumes/DBFS em Databricks).
dir_dados: data
dir_landing: data/landing
dir_lakehouse: data/lakehouse
dir_warehouse: data/spark-warehouse

modo_execucao: full  # full | incremental
