name: CI

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Instalar ruff
        run: pip install ruff
      - name: Ruff
        run: ruff check src tests conftest.py

  testes:
    name: Testes (pytest + Spark)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17 (requerido pelo Spark)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Cache de pacotes Ivy (jars Delta)
        uses: actions/cache@v4
        with:
          path: ~/.ivy2
          key: ivy-${{ runner.os }}-delta-3.2.0

      - name: Testes (pytest)
        run: pytest -q

  validar-bundle:
    name: Validar YAML (bundle + workflows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Checar sintaxe YAML
        # A validacao completa contra o workspace roda no workflow databricks.yml
        # (com credenciais). Aqui garantimos ao menos YAML valido, sem segredos.
        run: |
          pip install pyyaml
          python - <<'PY'
          import yaml
          for f in ("databricks.yml",
                    ".github/workflows/ci.yml",
                    ".github/workflows/databricks.yml"):
              yaml.safe_load(open(f, encoding="utf-8"))
              print(f, "OK")
          PY
